data:
  source: "yfinance"
  symbol: "SPY"
  start: "2010-01-01"
  end: "2026-06-01"

model:
  lookback: 60
  horizon: 5
  d_model: 64
  nhead: 4
  num_layers: 2
  dropout: 0.1

training:
  batch_size: 64
  lr: 0.001
  weight_decay: 1e-5
  epochs: 200
  early_stopping_patience: 15

backtest:
  initial_capital: 100000
  position_size: 0.1
  commission: 0.001