name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint with Ruff
        run: uv run ruff check src/ tests/
      - name: Type check with mypy
        run: uv run mypy src/
      - name: Run tests
        run: uv run pytest tests/ -v